apiVersion: 1

datasources:
  - name: Retail Analytics Postgres
    type: postgres
    access: proxy
    uid: retail-postgres
    url: postgres:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: true
